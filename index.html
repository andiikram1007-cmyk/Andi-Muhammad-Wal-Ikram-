<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ayo Main Badminton!</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ff9aa2, #ff4d6d);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 50px;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }

    .container {
      margin-top: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #yesBtn:hover {
      transform: scale(1.1);
      background-color: #ff1e4d;
    }

    #noBtn {
      background-color: pink;
      color: black;
      position: absolute;
    }

    #message {
      margin-top: 30px;
      font-size: 1.5em;
      display: none;
    }

    .sticker {
      font-size: 50px;
      position: absolute;
      animation: float 3s infinite ease-in-out;
    }

    .s1 { top: 10%; left: 10%; }
    .s2 { top: 20%; right: 10%; }
    .s3 { bottom: 10%; left: 20%; }
    .s4 { bottom: 15%; right: 15%; }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>🏸 Ayo Main Badminton! 🏸</h1>
  <p>Lagi gabut? Mending keringetan dikit yuk 😆</p>

  <div class="container">
    <button id="yesBtn">Gass 🔥</button>
    <button id="noBtn">Tak nak 😜</button>
  </div>

  <div id="message">
    YEAAAY! 🔥 Siap-siap smash dan drop shot! 💪🏸  
    Badminton time = sehat + seru + happy 😎
  </div>

  <!-- Sticker lucu -->
  <div class="sticker s1">🏸</div>
  <div class="sticker s2">💖</div>
  <div class="sticker s3">😆</div>
  <div class="sticker s4">🔥</div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    // Tombol Gass
    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
    });

    // Tombol Tak Nak kabur
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("click", moveButton);

    function moveButton() {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    // Posisi awal tombol "Tak nak"
    moveButton();
  </script>

</body>
</html>
